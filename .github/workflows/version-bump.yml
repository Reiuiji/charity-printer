name: Auto Version Bump

on:
  pull_request:
    types: [closed]
    branches: [main, master]

permissions:
  contents: write

jobs:
  bump-version:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine bump type from branch name
        id: bump
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          echo "Branch: $BRANCH"

          if [[ "$BRANCH" == major/* || "$BRANCH" == major-* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == minor/* || "$BRANCH" == minor-* || "$BRANCH" == feat/* || "$BRANCH" == feature/* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$BRANCH" == patch/* || "$BRANCH" == fix/* || "$BRANCH" == hotfix/* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "type=none" >> "$GITHUB_OUTPUT"
            echo "Branch '$BRANCH' does not match any bump pattern, skipping."
          fi

      - name: Bump version
        if: steps.bump.outputs.type != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          OLD_VERSION=$(node -p "require('./package.json').version")
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version

          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "Bumped $OLD_VERSION → $NEW_VERSION (${{ steps.bump.outputs.type }})"

          git add package.json package-lock.json
          git commit -m "chore: bump version $OLD_VERSION → $NEW_VERSION [${{ steps.bump.outputs.type }}]"
          git tag "v$NEW_VERSION"
          git push origin HEAD --tags
